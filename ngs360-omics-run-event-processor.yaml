# ngs360-omics-run-event-processor

AWSTemplateFormatVersion: '2010-09-09'
Description: NGS360 Omics Run Event Processor CloudFormation Template

Parameters:
  DeadLetterEmail:
    Type: String
    Description: Email address to send notifications for failed Lambda executions
  ApiServer:
    Type: String
    Description: NGS360 API Server URL
  DataLakeBucket:
    Type: String
    Description: S3 Bucket name for storing omics run event data
  BucketPrefix:
    Type: String
    Default: omics-run-events
    Description: S3 Prefix (folder) within the Data Lake Bucket to store omics run event data
  VerboseLogging:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: Enable verbose logging in the Lambda function
  SecurityGroupId:
      Type: String
      Description: Security Group ID for the Lambda function
  SubnetId:
      Type: String
      Description: Subnet ID for the Lambda function

Resources:
  DeadLetterQueue:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: ngs360-omics-run-event-processor-dead-letter-queue
      Subscription:
        - Endpoint: !Ref DeadLetterEmail
          Protocol: email

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: SNSPublishPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref DeadLetterQueue
        - PolicyName: S3AccessPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub arn:aws:s3:::${DataLakeBucket}/*

  OmicsRunEventProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code: 
        S3Bucket: !Ref DataLakeBucket
        S3Key: !Join ['', [!Ref BucketPrefix, '/lambda-package.zip']]

      DeadLetterConfig:
        TargetArn: !Ref DeadLetterQueue
      Description: NGS360 Omics Run Event Processor Lambda Function
      Environment:
        Variables:
          API_SERVER: !Ref ApiServer
          DATA_LAKE_BUCKET: !Ref DataLakeBucket
          S3_PREFIX: !Ref BucketPrefix
          VERBOSE_LOGGING: !Ref VerboseLogging
  
      Handler: lambda.lambda_handler
      LoggingConfig: 
        LogFormat: Text
        LogGroup: /aws/lambda/ngs360/omics-run-event-processor

      PackageType: Zip

      Role: !GetAtt LambdaExecutionRole.Arn
      Runtime: python3.12
  
      Tags: 
        - Key: Application
          Value: NGS360
        - Key: Service
          Value: OmicsRunEventProcessor
      Timeout: 900
      VpcConfig: 
        SecurityGroupIds: 
          - !Ref SecurityGroupId
        SubnetIds: 
          - !Ref SubnetId

  OmicsRunEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: EventBridge Rule to trigger Omics Run Event Processor Lambda Function
      EventPattern:
        source:
          - omics.run
        detail-type:
          - Omics Run State Change
      State: ENABLED
      Targets:
        - Arn: !GetAtt OmicsRunEventProcessorFunction.Arn
          Id: "OmicsRunEventProcessorFunctionTarget"

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref OmicsRunEventProcessorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt OmicsRunEventRule.Arn

Outputs:
  LambdaFunctionName:
    Description: Name of the Omics Run Event Processor Lambda Function
    Value: !Ref OmicsRunEventProcessorFunction
