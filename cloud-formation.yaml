# ngs360-omics-run-event-processor
AWSTemplateFormatVersion: '2010-09-09'
Description: NGS360 Omics Run Event Processor CloudFormation Template

Parameters:
  DeadLetterEmail:
    Type: String
    Description: Email address to send notifications for failed Lambda executions
  ApiServer:
    Type: String
    Description: NGS360 API Server URL
  DataLakeBucket:
    Type: String
    Description: S3 Bucket name for storing omics run event data
  BucketPrefix:
    Type: String
    Default: omics-run-events
    Description: S3 Prefix (folder) within the Data Lake Bucket to store omics run event data
  VerboseLogging:
    Type: String
    AllowedValues:
      - 'true'
      - 'false'
    Default: 'false'
    Description: Enable verbose logging in the Lambda function
  SecurityGroupId:
      Type: String
      Description: Security Group ID for the Lambda function
  SubnetId:
      Type: String
      Description: Subnet ID for the Lambda function

Resources:
  DeadLetterQueue:
    Type: AWS::SNS::Topic
    Properties:
      DisplayName: NGS360 Omics Run Event Processor Dead Letter Queue
      TopicName: ngs360-omics-run-event-processor-dead-letter-queue
      Subscription:
        - Endpoint: !Ref DeadLetterEmail
          Protocol: email

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

  OmicsRunEventProcessorFunction:
    Type: AWS::Lambda::Function
    Properties:
      Code: 
        ZipFile: |-
          ''' Omics Run Event Processor Lambda Function '''
          import json
          from datetime import datetime
          import uuid
          import os
          import logging

          import boto3
          from botocore.exceptions import ClientError
          import requests


          def flatten(event):
              ''' Flattens a nested JSON object into a single-level dictionary.'''
              flat_event = {}
              for key, value in event.items():
                  if isinstance(value, dict):
                      for sub_key, sub_value in value.items():
                          flat_event[f"{sub_key}"] = sub_value
                  elif isinstance(value, list):
                      for i, item in enumerate(value):
                          if isinstance(item, dict):
                              for sub_key, sub_value in item.items():
                                  flat_event[f"{sub_key}_{i}"] = sub_value
                          else:
                              flat_event[f"{key}_{i}"] = item
                  else:
                      flat_event[key] = value
              return flat_event


          def setup_logging():
              ''' Sets up logging configuration '''
              VERBOSE_LOGGING = os.environ.get(
                  'VERBOSE_LOGGING', 'false'
              ).lower() == 'true'
              log_level = logging.DEBUG if VERBOSE_LOGGING else logging.INFO
              logging.basicConfig(
                  level=log_level,
                  format='%(asctime)s - %(levelname)s - %(message)s'
              )
              logger = logging.getLogger()
              logger.setLevel(log_level)

              # Reduce boto3 logging noise
              logging.getLogger('boto3').setLevel(logging.INFO)
              logging.getLogger('botocore').setLevel(logging.INFO)

              logger.info("Received event: %s", json.dumps(event))
              return logger


          def lambda_handler(event, context):
              '''
              Main Entry Point for Lambda function

              Calls NGS360 API Service with run event information
              '''
              logger = setup_logging()
              s3 = boto3.client('s3')

              API_SERVER = os.environ['API_SERVER']
              DATA_LAKE_BUCKET = os.environ['DATA_LAKE_BUCKET']
              S3_PREFIX = os.environ.get('S3_PREFIX', 'omics-run-events')
              if not API_SERVER or not DATA_LAKE_BUCKET:
                  raise ValueError(
                      'API_SERVER and/or DATA_LAKE_BUCKET environment variables not set'
                  )

              # Generate unique filename using timestamp and UUID
              timestamp = datetime.now().strftime('%Y%m%d_%H%M%S')
              file_name = f'event_{timestamp}_{str(uuid.uuid4())}.json'

              # Flatten the event JSON
              flat_event = flatten(event)

              # Convert flattened dict to JSON string
              json_data = json.dumps(flat_event)

              # Upload to S3
              try:
                  s3.put_object(
                      Bucket=DATA_LAKE_BUCKET,
                      Key=f'{S3_PREFIX}/{file_name}',
                      Body=json_data,
                      ContentType='application/json'
                  )
              except ClientError as e:
                  raise ClientError(
                      f'Error uploading to S3: {str(e)}',
                      operation_name="s3::put_object"
                  ) from e

              # Call NGS360 API
              api_url = f'{API_SERVER}/api/v1/omics/run-event'
              headers = {'Content-Type': 'application/json'}
              requests.post(api_url, headers=headers, data=json_data, timeout=10)

              msg = f'Event processed, {json_data} -> {S3_PREFIX}/{file_name}'
              logger.info(msg)
              return {
                  'statusCode': 200,
                  'body': msg
              }

      DeadLetterConfig:
        TargetArn: !Ref DeadLetterQueue
      Description: NGS360 Omics Run Event Processor Lambda Function
      Environment:
        Variables:
          API_SERVER: !Ref ApiServer
          DATA_LAKE_BUCKET: !Ref DataLakeBucket
          S3_PREFIX: !Ref BucketPrefix
          VERBOSE_LOGGING: !Ref VerboseLogging
  
      Handler: lambda_handler
      LoggingConfig: 
        ApplicationLogLevel: INFO
        LogFormat: Text
        LogGroup: /aws/lambda/ngs360/omics-run-event-processor
        SystemLogLevel: INFO

      PackageType: Zip

      Role: !Ref LambdaExecutionRole
      Runtime: python3.12
  
      Tags: 
        - Key: Application
          Value: NGS360
        - Key: Service
          Value: OmicsRunEventProcessor
      VpcConfig: 
        SecurityGroupIds: 
          - !Ref SecurityGroupId
        SubnetIds: 
          - !Ref SubnetId

Outputs:
  LambdaFunctionName:
    Description: Name of the Omics Run Event Processor Lambda Function
    Value: !Ref OmicsRunEventProcessorFunction
